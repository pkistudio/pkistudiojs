name: Publish npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, for example 0.3.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package version
        run: |
          expected_version="${{ inputs.version }}"
          if [[ -z "$expected_version" ]]; then
            expected_version="${GITHUB_REF_NAME#v}"
          fi

          actual_version="$(node -p "require('./package.json').version")"
          if [[ "$actual_version" != "$expected_version" ]]; then
            echo "package.json version $actual_version does not match expected version $expected_version"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Run checks
        run: npm run check

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public